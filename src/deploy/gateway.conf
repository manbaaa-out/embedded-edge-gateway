# ============================================================
# Embedded Edge Gateway 配置文件
# 部署位置: /etc/gateway.conf
# 修改后热加载: sudo systemctl reload gateway  (发 SIGHUP,无需重启)
# ============================================================

# ---- A 档:可热加载,改完立即生效 ----
log_level    = 1          # 0=DEBUG 1=INFO 2=WARN 3=ERROR
idle_timeout = 5          # HTTP 空闲连接超时(秒)
report_n     = 10         # 上报参数
mqtt_keepalive = 60       # MQTT keepalive(秒)

# ---- B 档:可热加载,会重建对应资源(串口/MQTT/DB) ----
serial_path = /dev/ttyUSB0 # 真机改成 /dev/ttyUSB0 或 /dev/ttyAMA0
serial_baud = 115200      # 波特率(9600/19200/38400/57600/115200)
mqtt_host   = localhost   # MQTT broker 地址
db_path     = /tmp/gateway.db   # 真机建议放 /var/lib/gateway/gateway.db

# ---- C 档:改了需重启进程才生效(热加载会忽略并告警)----
mqtt_port    = 1883
http_port    = 8888
worker_count = 4